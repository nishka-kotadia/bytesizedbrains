services:

  # ── FastAPI backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: prism-backend
    restart: unless-stopped
    env_file:
      - ./Backend/.env          # LLM_PROVIDER, LLM_MODEL, LLM_API_KEY
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/research.db
    ports:
      - "8000:8000"
    volumes:
      - prism-data:/data         # persists research.db + knowledge graph
      - prism-cache:/app/data    # persists embeddings cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Nginx frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: prism-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

# ── Named volumes ────────────────────────────────────────────────────────
volumes:
  prism-data:
  prism-cache:
